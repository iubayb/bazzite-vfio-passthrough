# Copy this file to ~/.config/environment.d/50-hdr-vrr.conf inside the Bazzite guest
# to enable HDR10 + FreeSync/VRR in Steam Gaming Mode (gamescope).
# Takes effect on next login / VM restart.

ADAPTIVE_SYNC=1           # gamescope --adaptive-sync (VRR/FreeSync)
ENABLE_GAMESCOPE_HDR=1    # gamescope --hdr-enabled (HDR10 output)
HDR_ENABLE_PQ=1           # internal PQ tone mapping (proper HDR)
GAMESCOPE_HDR_NITS=203    # SDR content displayed at 203 nits inside HDR
