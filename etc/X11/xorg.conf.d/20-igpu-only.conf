# Prevent SDDM's greeter Xorg from enumerating the AMD 6800 XT (card1).
# Host display is driven by Intel iGPU (card0) on motherboard DisplayPort.
# Without this, Xorg holds an FD on /dev/dri/card1 which can interfere
# with dynamic vfio-pci rebinding.

Section "ServerFlags"
    Option "AutoAddGPU"  "false"
    Option "AutoBindGPU" "false"
EndSection

Section "Device"
    Identifier  "Intel iGPU"
    Driver      "modesetting"
    BusID       "PCI:0:2:0"
    Option      "PrimaryGPU" "true"
EndSection
