# VFIO modules for dynamic GPU binding via libvirt hook.
# No static binding — amdgpu owns 6800 XT at boot so host can use ROCm/compute.
# The hook in /etc/libvirt/hooks/qemu rebinds to vfio-pci when the VM starts
# and rebinds to amdgpu when the VM shuts down.

# Prevent the legacy radeon driver from competing for the card
blacklist radeon
